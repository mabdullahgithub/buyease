client_id = "REPLACE_WITH_SHOPIFY_API_KEY"
name = "BuyEase"
application_url = "https://app.buyease.app"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[access_scopes]
scopes = "read_orders,write_orders,read_products,write_products"
# Shopify managed installation: keep legacy flow disabled.
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://app.buyease.app/api/auth",
]

[webhooks]
api_version = "2025-01"

[[webhooks.subscriptions]]
topics = [ "app/uninstalled", "orders/create" ]
compliance_topics = [ "customers/redact", "customers/data_request", "shop/redact" ]
uri = "/api/webhooks"
